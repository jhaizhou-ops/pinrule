name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check karma/ tests/

      - name: Dead code scan (vulture, min-confidence 60)
        run: vulture karma/ --min-confidence 60

      - name: Test
        run: pytest tests/ -q

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Verify wheel contains yaml templates
        run: |
          python -c "
          import zipfile, sys
          z = zipfile.ZipFile('dist/karma-0.1.0-py3-none-any.whl')
          names = z.namelist()
          expected = ['data/sticky.dev.example.yaml', 'data/config.example.yaml']
          missing = [n for n in expected if n not in names]
          if missing: sys.exit(f'wheel 缺文件: {missing}')
          print('wheel 含全部模板 ✓')
          "
