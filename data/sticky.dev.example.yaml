# karma sticky 模板 — 软件开发场景专用（7 条精选）
#
# karma = 通用 hook 框架 + 场景规则集
# 本文件是「软件开发」场景预设。其他场景（写作 / 研究 / 产品 / 设计等）
# 需要不同的规则集 — 欢迎社区贡献。
#
# 安装：karma init 会复制本文件到 ~/.claude/karma/sticky.yaml
# 上限：10 条（超过 12 hook 拒绝加载）
#
# ⚠️ 不是每条都对每个用户合适，按场景取舍：
#   - 第 3 条 chinese-plain-no-jargon：**中文用户**生效。英文母语用户应
#     `karma sticky remove chinese-plain-no-jargon` 删掉，避免持续假阳。
#   - 第 5 条 no-testset-no-future-leakage：**ML / 数据 / 评测**场景生效。
#     普通后端 / 前端 / 工具开发用不上，可删。
#   - 其他 5 条（long-term / non-blocking / loud-failure / deep-fix /
#     read-before-write）跨场景通用，建议保留。
#
# 字段:
#   id                  : kebab-case 短 slug
#   preference          : 多行允许，建议「方向 + 例外 + 决策提示」
#   violation_keywords  : 关键词列表（自然语言层扫描）
#                         规则：用「意图主语 + 动作」格式（如「我先打个补丁」）
#                         而非纯名词（如「硬编码」），减少描述类假阳
#   violation_checks    : 工程检测函数名列表（karma.checks.REGISTRY 里）
#   force_block_exempt  : 可选 bool，default false。开启后该规则累积违反多次也
#                         不会触发 Stop hook 强制 decision=block 让 Agent 停下。
#                         给「应该继续推进 / 不阻塞」类规则用 — 否则累积处罚
#                         反而违反规则本身（语义自我矛盾）。

- id: long-term-fundamental
  preference: |
    用最根本、最长期、最普适、最优雅的方案。
    不打补丁、不硬编码、不为追短期 KPI 牺牲长期质量。
    深挖到真根因再动手；遇到难题先想「最干净的解法是什么」而非「最快糊过去」。
  violation_keywords:
    # 「意图前缀 + 动作」格式 — 区别于讨论这些概念
    - 我先打个补丁
    - 先打个补丁应付
    - 我先硬编码
    - 先硬编码一下
    - 先快速绕过
    - 临时方案
    - 先用 workaround
    - 先这样
    - 暂时这样
    - 先 hack
  violation_checks:
    - long_term_fundamental

- id: non-blocking-parallel
  preference: |
    不阻塞前端 — 测试 / 子 Agent / 长任务跑步时，立刻并行推进其他能做的事。
    优先多 Agent 并发，不串行等。
    跑 background 任务后必须继续推进 — 起完任务就「等」也算阻塞。
  violation_keywords:
    - 等测试完
    - 等测试跑完
    - 等子 Agent
    - 等 X 完成后再 Y
    - 串行执行
    - 我先等
    - 等一下
    - 等会儿
    - 等结果出来
    - 我盯着
    - 我先看着
  violation_checks:
    - non_blocking_parallel
  # 「不阻塞」语义跟 force_block「累积太多必须停下让用户介入」自相矛盾 — 豁免
  force_block_exempt: true

- id: chinese-plain-no-jargon
  preference: |
    用直白中文。不用英文技术术语（precision / supervisor / dispatcher / mutex 等）。
    用「精度 / 召回率 / 分发器 / 互斥锁」等完整汉字。
    必须用英文专有名词时短解释一下。用类比解释复杂概念，不堆 jargon。
  # 默认工程监督层撤掉 — 容易执行 + 犯错代价小，靠 user_prompt_submit 头部注入提醒
  # 频率够用。要恢复工程检查就加回 violation_checks: [chinese_plain_no_jargon]
  # check 代码 karma/checks/chinese_plain.py + REGISTRY 注册保留供恢复
  violation_keywords: []
  violation_checks: []

- id: loud-failure-with-evidence
  preference: |
    失败要响亮，完成要有证据。不确定就明说，不要用「应该」「可能」掩盖。
    完成代码任务时必须附证据（test pass / build OK / 数据 / 截图）。
    「完成」但 skip / mock / 假数据不算完成。
  violation_keywords:
    - skip 了
    - 暂时假数据
    - 临时 mock
  violation_checks:
    - loud_failure_with_evidence

- id: no-testset-no-future-leakage
  preference: |
    开发原则：不要让测试数据反喂主流程。
    - mock 数据 / fixture 不能进真实业务路径
    - 测试用例不要 hardcode 在主代码里
    - 评测结果不能反喂训练（ML 场景）
    改 prompt / 算法后必须重跑评测，不能用旧 cache 看效果。
  violation_keywords:
    - mock 数据复用
    - 测试用例 hardcode
    - fixture 闭环
    - 用真数据测试
    - 反喂池子
  violation_checks:
    - no_testset_no_future_leakage

- id: deep-fix-not-bypass
  preference: |
    karma 拦截发生时，先停下深挖**为什么拦** — 是真违反还是 karma 自身 bug。
    禁止通过手动改 ~/.claude/karma/session-state/ / 临时改 sticky.yaml /
    hack 字面 等方式绕开检测。
    经典 anti-pattern：被拦 → 手动改内部状态让 commit 通过。
    正确做法：被拦 → 看 trigger → 深挖 pattern 或系统 bug → 修真根因。
    例外：用户明确说「绕一下先 commit」→ 才能绕。
  violation_keywords:
    - 强制接证据
    - 手动接入
    - hack 让 commit
  violation_checks:
    - bypass_karma_detection

- id: read-before-write
  preference: |
    加代码前先读：上游调用、相关 exports、共享 utils、已有约定。
    「看起来不相关」是最危险的话 — 通常意味着没读够上下文。
    改任何模块前看清这个模块怎么被用、跟谁耦合、改了影响谁。
  violation_keywords:
    - 看起来不相关
    - 应该不影响其他
  violation_checks:
    - read_before_write
