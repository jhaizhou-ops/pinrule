# karma i18n — English translations
#
# Keys are stable identifiers; values are user-visible English strings.
# Supports {placeholder} interpolation via str.format() in karma.i18n.tr().

# ===== rule baseline header (format_for_injection) =====
inject.header.title: "[karma — Your long-term agreement with the user]"
inject.header.line1: "You're collaborating with a real human user who listed several long-term priorities."
inject.header.line2: "This isn't rules and isn't a judgment — these are the collaborative agreements they hope to build with you."
inject.drift_marker: "  〔Last response had drift on this one — let's realign this turn〕"
anchor.header.title: "[karma — long-term agreement anchor (compact form; full preferences injected at session start)]"
anchor.header.line: "This turn: a quick name + one-line reminder of each direction. Full preference text was injected at session start."
catalog.header.title: "[karma — active rule IDs (Cursor visibility)]"
catalog.header.line: "If the user asks for karma rule ids, list these verbatim (no need to read rules.yaml):"

# ===== PostToolUse mid-injection (锚定刷新) =====
mid_inject.header.title: "[karma — After long context, recall the agreement with the user]"
mid_inject.header.line1: "Context has accumulated for a while. Reminding you of the long-term priorities"
mid_inject.header.line2: "(no need to respond, just refresh in mind to avoid future drift):"

# ===== UserPromptSubmit strong reminder (上一回应违反) =====
strong_reminder.header.title: "\n\n[karma — Last response had some misalignment with user agreement]"
strong_reminder.header.line: "Your last response had drift on some points; see if you can adjust this turn:"
strong_reminder.footer: "\nJust respond naturally this turn; no need to over-compensate for this one."

# ===== Stop hook reason (keep-pushing intervention) =====
stop.reason: "[karma — Last response didn't show a next-step push signal] The user is fully-delegating — they expect immediate continuation after finishing a wave. If you need their judgment, ask clearly; if truly saturated, say where you're stuck — don't silently wait. (Reminder {count}/{max})"

# ===== Stop hook force_block reason =====
stop.force_block.reason: "karma forced intervention: cumulative violations of {rules} totaling {count} times. Must fix root cause (deep-dive pattern / engine bug / protocol) or explicitly hand off to user. No more bypassing (manually modifying karma state / temporarily disabling rules)."

# ===== karma init summary of default rules enabled (v0.9.9) =====
# Under the "Agent installs karma for the user" scenario, this block gets relayed
# to the user. Deliberately no "next steps: run X" tips — that would turn into
# "user types commands manually" friction, opposite of onboarding's intent.
init.summary.header: "Default rules now enabled for you ({count}/{soft_max} soft cap):"
init.summary.footer: "Tested: this rule injection accounts for under 3% of karma's per-session token spend — relax and enjoy the \"Agent doesn't drift in long tasks\" feel. To add or modify rules, just type /karma <natural-language description of the rule> in your AI client."

# ===== SessionStart baseline =====
session_start.compact.title: "[karma — After context compact, recall the agreement with the user]"
session_start.compact.prior_drift_header: "Rules that drifted before compact (give them extra attention on restart):"
session_start.compact.tail: "After compact, agreements easily fade in new context — stay aware of behaving in these directions."
session_start.resume.title: "[karma — Session resumed, recalling agreement with the user]"
session_start.startup.title: "[karma — Session start, your long-term agreement with the user (source={source})]"

# ===== PreCompact (Cursor user_message) =====
pre_compact.cursor_notice: "karma saved your collaboration rules to disk before context compact. After compact, SessionStart will reload them — keep following those agreements."

# ===== SubagentStart =====
subagent_start.title: "[karma — You're a sub-Agent sent by the parent session, inheriting the user's long-term agreements]"
subagent_start.tail: "Behave per these directions when running tasks. The main Agent will receive a summary reminder when you finish."

# ===== Violation stderr =====
violation.stderr.line: "⚠️ karma: Agent violated {rule_id!r} — {trigger}"
violation.stderr.suggestion: "   Suggestion: {fix}"
violation.keyword.stderr.line: "⚠️ karma: Agent triggered keyword for {rule_id!r} (word {trigger!r})"

# ===== Notifications =====
notify.violation.title: "karma detected violation"
notify.escalated.title: "🚨 karma severe — {count} cumulative violations"

# ===== 8 check functions suggested_fix (v0.5.3) =====

# chinese_plain (3 entries) — Chinese-user rule, English-default install removes it
check.chinese_plain.ratio.fix: "Reading this section, the user may need to pause and look up several words. See which English are 'project names / paper terms' (keep these + add Chinese explanation on first occurrence), which are 'casually used English' (switch to 精度 / 召回率 / 分发器 etc. Chinese). Goal isn't padding Chinese ratio — it's letting the user finish reading without word-lookup."
check.chinese_plain.jargon.fix: "'{term}' makes the user pause to think 'what's this?'. If it's a project name / paper term / standard interface name (must keep), add a Chinese short explanation on first occurrence (e.g. `precision (精度)`); if it's casually-used English, switch directly to '精度 / 召回率' etc."
check.chinese_plain.repeated_prefix.fix: "Repeated '{prefix}X' prefix stacking makes expression feel self-justifying rather than natural — user reads it as nervous. Rule #4 'evidence' wants data / test-pass / screenshots / reproduction scripts — not prefix-emphasis words. Next time try removing the prefix for more direct sentences."

# non_blocking (4 entries)
check.non_blocking.python_block.fix: "python -c with time.sleep / subprocess sleep periods make the user wait; experience is 'stuck.' Switch to run_in_background=True / asyncio + concurrency, then immediately push the next doable thing — task completion will notify you."
check.non_blocking.sleep.fix: "sleep periods make the user wait; experience is 'stuck.' Switch to run_in_background=True kicking off the task, then immediately push the next doable thing (read related files / spawn another sub-agent / design next step) — task completion will notify you. For wait-on-condition, use Monitor + until loop."
check.non_blocking.wait.fix: "wait periods make the user wait; experience is 'stuck.' Switch to run_in_background=True, then immediately push the next doable thing — task completion will notify you. (kubectl/docker/aws wait etc. synchronous primitives are exempt.)"
check.non_blocking.long_task.fix: "{cmd} is a long task; user waits for your output during it. Add run_in_background=True so you can immediately push other things; task completion notifies you."

# evidence (3 entries)
check.evidence.commit.fix: "commit is a signal to the user 'this version is reliable.' Run tests (pytest / npm test etc.) confirming passing before commit, so they don't have to worry seeing the commit."
check.evidence.completion.fix: "When you say 'done,' attach test evidence — running pytest / build seeing PASS numbers makes the user directly trust results, more credible than empty 'done.'"
check.evidence.weak_claim.fix: "'should / probably' leaves the user uncertain whether you checked or guessed. If you're truly unsure, say 'I'm not sure X because Y, can I run Z to verify?' — this builds more trust than fake-confident. If you're certain, just say it; remove 'should' for clarity."

# keep_pushing (2 entries)
check.keep_pushing.stop_hint.fix: "The user is fully-delegating — they expect you to autonomously continue, not wait for their feedback every step. If you're saturated / disagree on direction / waiting for their decision (reasonable stop), say where you're stuck so they know; otherwise just keep pushing."
check.keep_pushing.default.fix: "The user is fully-delegating — after finishing a wave, they expect you to immediately find the next push point and continue, not silently stop and wait for feedback. If you need their judgment, ask clearly; if truly saturated (reasonable stop), say where you're stuck so they know."

# read_first (1 entry)
check.read_first.fix: "First Read {file_path} to see existing content / upstream callers / existing conventions — spend 2 minutes to avoid the 30-minute-later-discovered cascading bug. Seeing the coupling before changing makes the user more comfortable."

# bypass_karma (1 entry)
check.bypass_karma.fix: "Manually modifying karma internal state is performing for the user — short-term passing but they'll find out, trust suffers. If karma blocks incorrectly, dig into root cause (pattern too wide → tighten / catchup race / hook protocol bug) — this way the next person hitting the same scenario won't be blocked the same way. If you really need to bypass, explicitly say 'I plan to bypass because X' and let the user decide; don't silently bypass."

# long_term (7 entries) — Phase D wave 2
check.long_term.long_id_branch.fix: "Long ID literal hard-coded in an if branch means every new case requires touching this code — lift it into config or a general dispatch rule so it can evolve long-term."
check.long_term.blacklist_literal.fix: "Hard-coding a black/white list inline means every name change requires a code edit — move it to config or a rule-based check so it can evolve."
check.long_term.uppercase_const_list.fix: "An UPPER_CASE constant with 5+ string elements is usually a hard-coded list — move it to config or a rule-based check so it can evolve long-term."
check.long_term.commit_hack.fix: "The commit subject is the user's signal of 'what changed this time.' Rewrite it as 'fix X: reason Y' so they can understand without expanding the diff."
check.long_term.git_skip_verify.fix: "Skipping pre-commit / hook verification = short-term pass but broken code enters git history — the user will see it on review. Fix the underlying issue first, then commit."
check.long_term.todo_marker.fix: "Leaving TODO / FIXME / HACK in code = leaving debt for the next person. Either resolve it before commit, or explicitly note a follow-up plan in the PR so the user knows."
check.long_term.patch_intent.fix: "'Quick fix / workaround / temporary' intent comments = signal to the user 'debt not paid.' Find the root-cause solution first; they'll feel more at ease."

# testset (7 entries) — Phase D wave 2
check.testset.reverse_feed.fix: "Feeding the eval pool back = short-term precision numbers look good but the user won't trust them. After changing prompt / algorithm, re-run eval clean; don't recycle."
check.testset.detail_writeback.fix: "Treating eval detail as training input = feeding future data into the current module, which the user takes very seriously as cheating. Keep splits clean."
check.testset.cross_split_copy.fix: "Moving eval / test data into the training directory = data contamination; the user is strict about eval cleanliness. Keep splits isolated."
check.testset.detail_append.fix: "Appending eval detail into training / pool files = reverse-feeding cheating; the user is strict about eval cleanliness."
check.testset.split_hardcode.fix: "Hard-coding turn_idx thresholds means future split-size changes require editing code — use a train/test split config so it can evolve."
check.testset.hash_branch.fix: "Writing test-set case IDs into if branches = special-casing on future eval data, which the user takes seriously as cheating. Use general dispatch logic instead."
check.testset.case_list_hash.fix: "Hard-coding specific case IDs into a list = suspected reverse-feeding; the user is strict about eval cleanliness. Use general fixtures / algorithmic case-ID generation."

# ===== 28 check trigger entries (v0.5.4) — audit-log classification labels =====

# chinese_plain (3 entries)
check.chinese_plain.ratio.trigger: "Natural-language Chinese ratio {ratio}% < {min}%"
check.chinese_plain.jargon.trigger: "Jargon {term!r} not followed by Chinese explanation in parens"
check.chinese_plain.repeated_prefix.trigger: "Prefix character {prefix!r} repeats {count} times (suspected defensive stacking)"

# non_blocking (4 entries)
check.non_blocking.python_block.trigger: "Real blocking call inside python -c: {call!r}"
check.non_blocking.sleep.trigger: "Bash sleep command: {cmd!r}"
check.non_blocking.wait.trigger: "Bash wait command blocking"
check.non_blocking.long_task.trigger: "Long task without run_in_background: {cmd!r}"
check.non_blocking.mcp_await.trigger: "Cursor MCP long poll ({tool}): block_until_ms ≥ 30s"
check.non_blocking.mcp_await.fix: "Do not block on Await/MCP polling for 30s+. Use run_in_background=True on Shell tasks, or poll with short block_until_ms and keep pushing other work."
check.non_blocking.mcp_long_poll.fix: "Shorten block_until_ms or use background Shell + notifications instead of a long synchronous MCP wait."

# evidence (3 entries)
check.evidence.commit.trigger: "No recent passing-test evidence in session before git commit"
check.evidence.completion.trigger: "Claimed {word!r} but no recent passing-test evidence in session"
check.evidence.weak_claim.trigger: "Used '{word}' as a hard claim without test evidence"

# keep_pushing (2 entries)
check.keep_pushing.stop_hint.trigger: "Response tail contains pause phrase {word!r} — explicit stop"
check.keep_pushing.default.trigger: "Response is pure-statement conclusion with no push signal / no decision question — real stop without a next step"

# read_first (1 entry)
check.read_first.trigger: "{tool} {file_path} without prior Read"

# bypass_karma (1 entry)
check.bypass_karma.trigger: "Bypass attempt — manual write to karma internal state ({target!r})"

# hook output templates (v0.11.4 i18n)
hook.pre_tool_use.deny_engine_reason: "karma blocked: violation of {rule_id!r}.\nDetected: {trigger}\nDirection: {preference}\nSuggestion: {fix}"
hook.pre_tool_use.deny_keyword_reason: "karma blocked: violation of {rule_id!r} (keyword {trigger!r}).\nDirection: {preference}\nRephrase — don't use {trigger!r} like this."
hook.stop.violation_line: "⚠️ karma: Agent violated {rule_id!r} — {trigger}"
hook.stop.suggestion_line: "   suggestion: {fix}"
hook.stop.keyword_line: "⚠️ karma: Agent hit keyword {rule_id!r} (word {trigger!r})"

# long_term (7 entries)
check.long_term.long_id_branch.trigger: "Long ID literal in if branch (special-case hard-code)"
check.long_term.blacklist_literal.trigger: "Black/white list inline literal (variable name matches blacklist semantics)"
check.long_term.uppercase_const_list.trigger: "UPPER_CASE constant + 5+ string list (suspected hard-coded black/white list)"
check.long_term.commit_hack.trigger: "git commit subject contains quick fix / hack / temp / workaround"
check.long_term.git_skip_verify.trigger: "git destructive action with skip-verification flag"
check.long_term.todo_marker.trigger: "Code contains TODO/FIXME/HACK/XXX marker comment"
check.long_term.patch_intent.trigger: "Code contains 'patch / bypass / workaround' intent comment"
check.long_term.response_patch_intent.trigger: "Your wording shows short-term intent ('I'll patch this / hardcode temporarily / quick workaround') — user expects long-term root cause"
check.long_term.response_acknowledge_but_proceed.trigger: "You acknowledged 'not long-term' but still declared 'going ahead anyway' — contradicts user's long-term root-cause expectation"
check.deep_fix.edit_after_test_fail_no_read.trigger: "Editing {file_path} immediately after test failure but you haven't Read it this session — classic 'shallow patch' pattern (not looking at source before changing)"
check.deep_fix.edit_after_test_fail_no_read.fix: "Read {file_path} first to understand the real root cause (function / data flow / caller dependencies), then decide if this single fix is enough or the issue is upstream. Changing without reading = performing a short-term patch for the user; the real cause may be elsewhere."

# testset (7 entries)
check.testset.reverse_feed.trigger: "Reverse-feeding eval pool (writing back to gold_cases / eval_cases)"
check.testset.detail_writeback.trigger: "Writing detail.json (eval result) back into training data"
check.testset.cross_split_copy.trigger: "Bash cross-split data copy (eval / test → train)"
check.testset.detail_append.trigger: "Appending eval detail to training file"
check.testset.split_hardcode.trigger: "Data-split boundary hard-coded (turn_idx >= N)"
check.testset.hash_branch.trigger: "Long hash / UUID literal in comparison or case_id assignment (test-set case ID hard-coded)"
check.testset.case_list_hash.trigger: "Test-set / case list contains hard-coded long-hash literal"

