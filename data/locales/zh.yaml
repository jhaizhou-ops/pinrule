# karma i18n — 中文翻译
#
# Key 是稳定标识符, value 是用户可见的中文字符串.
# 支持 {placeholder} 占位符 (karma.i18n.tr() 用 str.format() 插值).

# ===== 规则 baseline 头部 (format_for_injection) =====
inject.header.title: "[karma — 你跟用户的长期默契]"
inject.header.line1: "跟你协作的是一位这位用户，他列出了几条长期最看重的方向。"
inject.header.line2: "这不是规则也不是审判 — 是他希望跟你建立的协作默契。"
anchor.header.title: "[karma — 长期默契提示（精简版，完整 preference 见 session 起手注入）]"
anchor.header.line: "本 turn 提醒一下规则名跟核心方向一句话，详细 preference 已在 session 起手注入过。"
inject.drift_marker: "  〔上一回应这条有偏离，本 turn 看看能否更对齐〕"

# ===== PostToolUse 中段注入 (锚定刷新) =====
mid_inject.header.title: "[karma — 长 context 后回想一下跟用户的默契]"
mid_inject.header.line1: "context 已累积一段，提醒一下用户长期看重的几条方向"
mid_inject.header.line2: "（不需要回应这条，只是让你在脑中回顾免得后续偏离）："

# ===== UserPromptSubmit 强提醒 (上一回应违反) =====
strong_reminder.header.title: "\n\n[karma — 上一回应有几处没对齐用户默契]"
strong_reminder.header.line: "你的上一回应在某些点上跟用户长期偏好有偏差，看看本 turn 能否调整："
strong_reminder.footer: "\n本 turn 自然回应即可，不需要为这条特意补偿过度。"

# ===== Stop hook reason (keep-pushing 干预) =====
stop.reason: "[karma — 上一回应没看到下一步推进信号]用户是全权委托型，他期待你完成一波后立刻接着推进。如果有方向需要他判断就明确问出来；如果是任务饱和合理停下，明说卡在哪一步让他知道，不要默默等。（提醒 {count}/{max}）"

# ===== Stop hook force_block reason =====
stop.force_block.reason: "karma 强制干预：累积违反 {rules} 共 {count} 次。必须 fix 原因（深挖 pattern / 工程 bug / 协议）或显式让用户介入。禁止继续绕（手动改 karma 状态 / 临时改 rules.yaml）。"

# ===== karma init 末尾的「默认启用规则」简要列表 (v0.9.9) =====
# Agent 代装场景下这段会被 Agent 转述给用户，让用户一眼看到默认开了什么规则。
# 刻意不加「下一步：跑 X 命令」类 tip — 那会变「让用户手动输指令」的 friction。
init.summary.header: "已为你启用以下默认规则 ({count}/{soft_max} 软上限):"
init.summary.footer: "经测试，以上规则注入仅占 karma 每 session 会话 token 消耗总量的 3% 以内，请放心使用，体验下 Agent 长任务不飘逸的爽感。希望增改规则直接输入 /karma <自然语言你想增加的规则> 即可。"

# ===== SessionStart baseline =====
session_start.compact.title: "[karma — context compact 后回想一下跟用户的默契]"
session_start.compact.prior_drift_header: "compact 前这几条曾经偏离过，重起时多留意："
session_start.compact.tail: "compact 后默契容易在新 context 里淡化 — 留意你正在按这些方向行为。"
session_start.resume.title: "[karma — session 接力，回想一下跟用户的默契]"
session_start.startup.title: "[karma — session 起手，跟用户的几条长期默契（source={source}）]"

# ===== SubagentStart =====
subagent_start.title: "[karma — 你是父 session 派来的子 Agent，继承用户的几条长期默契]"
subagent_start.tail: "跑任务时也按这些方向行为，主 Agent 会在你结束时收到摘要提醒。"

# ===== 违反 stderr =====
violation.stderr.line: "⚠️ karma: Agent 违反 {rule_id!r} — {trigger}"
violation.stderr.suggestion: "   建议：{fix}"
violation.keyword.stderr.line: "⚠️ karma: Agent 触发关键词 {rule_id!r} (词 {trigger!r})"

# ===== 桌面通知 =====
notify.violation.title: "karma 检测违反"
notify.escalated.title: "🚨 karma 严重 — 累积违反 {count} 条"

# ===== 8 个 check 函数 suggested_fix (v0.5.3) =====

# chinese_plain (3 处) — 中文用户规则, 英文 default 装机时移除
check.chinese_plain.ratio.fix: "本段读起来用户可能要停下查几次「这词什么意思」。看看哪些英文是「项目名 / 论文术语」（这种保留 + 首现加中文解释），哪些是「随手用了英文」（换成精度 / 召回率 / 分发器 等汉字）。目标不是中文凑比例，是让用户读完不用查词。"
check.chinese_plain.jargon.fix: "「{term}」用户可能要停下想「这是什么」。如果是项目名 / 论文术语 / 标准接口名（必须保留），首次出现配中文短解释（如 `precision (精度)`）让他能跟上；如果只是随手英文，直接换「精度 / 召回率」等汉字会让他读起来更顺。"

# non_blocking (4 处)
check.non_blocking.python_block.fix: "python -c 内 time.sleep / subprocess sleep 期间用户等你输出，体验是「卡了」。改 run_in_background=True 启动 / asyncio + 并发，然后立刻推进下一件能做的事 — 任务完成会通知到你。"
check.non_blocking.sleep.fix: "sleep 期间用户等你输出，体验是「卡了」。改成 run_in_background=True 启动任务，然后立刻推进下一件能做的（读相关文件 / 起另一个子 Agent / 设计下一步）— 任务完成你会被通知到。等条件成立用 Monitor + until 循环。"
check.non_blocking.wait.fix: "wait 期间用户等你输出，体验是「卡了」。改 run_in_background=True，然后立刻推进下一件能做的事 — 任务完成会通知到你。（kubectl/docker/aws wait 等同步原语已豁免）"
check.non_blocking.long_task.fix: "{cmd} 是长任务，跑期间用户等你的输出。加 run_in_background=True 让你能立刻推进其他事，任务完成会通知到你。"

# evidence (3 处)
check.evidence.commit.fix: "commit 是给用户的信号「这个版本可信」。跑测试（pytest / npm test 等）确认通过再 commit，让他看到 commit 时不用担心。"
check.evidence.completion.fix: "说「完成」时附测试证据 — 跑 pytest / build 看到 PASS 的数字让用户能直接信任结果，比空口「完成」更建立信任。"
check.evidence.weak_claim.fix: "「应该 / 可能」让用户分不清你是查过还是猜的。如果你不确定，明说「我不确定 X 因为 Y，可以跑 Z 验证下吗」— 这比错装确定更建立信任。如果是确定的就直说，去掉「应该」让信息清晰。"

# keep_pushing (2 处)
check.keep_pushing.stop_hint.fix: "用户是全权委托型 — 他期待你自主推进，不需要等他每步反馈。如果你是任务饱和 / 方向有分歧 / 等他拍板的合理停下，明说卡在哪一步让他知道；否则接着推进就好。"
check.keep_pushing.default.fix: "用户是全权委托型 — 完成一波后他期待你立刻找下个推进点继续，不要默默停下等他反馈。如果有方向需要他判断就明确问出来；如果是任务饱和合理停下，明说卡在哪一步让他知道。"

# read_first (1 处)
check.read_first.fix: "先 Read {file_path} 看现有内容 / 上游调用者 / 相关约定 — 花 2 分钟避免改坏 30 分钟才发现的连锁 bug。看清耦合再下手用户会更放心。"

# bypass_karma (1 处)
check.bypass_karma.fix: "手动改 karma 内部状态等于给用户演戏 — 短期通过但他会发现，信任会受损。如果 karma 拦得不对，深挖根因（pattern 过宽就收紧 / catchup race / hook 协议 bug）— 这样下次别人遇到同场景也不会被拦了。如果想要绕，明说「我打算绕开检测 因为 X」让用户决定，不要默默绕。"

# long_term (7 处) — Phase D 第二波
check.long_term.long_id_branch.fix: "长 ID 写在 if 分支后面别人加新 case 都要改这里 — 提到配置 / 通用判定逻辑让它能长期演化。"
check.long_term.blacklist_literal.fix: "黑白名单写死在代码里以后改名单要动代码 — 提到配置 / 用规则代替让它能演化。"
check.long_term.uppercase_const_list.fix: "全大写常量 5+ 元素字符串列表通常是硬编码名单 — 提到配置或用规则代替让它能长期演化。"
check.long_term.commit_hack.fix: "commit 标题是给用户看的「这次改了什么」信号。换成「fix X: 原因 Y」让他能直接看懂，不用展开读 diff。"
check.long_term.git_skip_verify.fix: "跳过 pre-commit / hook 验证 = 短期通过但坏的代码进了 git 历史 — 用户回看时会发现。先修对再提交。"
check.long_term.todo_marker.fix: "TODO / FIXME / HACK 留在代码里 = 给以后的人留债。要么本次解决掉再提交，要么在 PR 里明确 follow-up 计划让用户知道。"
check.long_term.patch_intent.fix: "「先这样 / 临时方案 / 凑数」意图注释 = 给用户的「债还没还」信号 — 找根因方案再提交，他会更放心。"

# testset (7 处) — Phase D 第二波
check.testset.reverse_feed.fix: "反喂池子 = 短期精度数字好看但用户不信。改 prompt / 算法后重跑评测让数字实际，不要回流。"
check.testset.detail_writeback.fix: "把评测 detail 当训练输入 = 用未来数据喂当前模块，用户对这种作弊很较真。保持 split 干净。"
check.testset.cross_split_copy.fix: "eval / test 数据搬到训练目录 = 数据污染，用户对评测干净度很较真。保持 split 隔离。"
check.testset.detail_append.fix: "eval detail 追加到训练 / 池子文件 = 反喂作弊，用户对评测干净度很较真。"
check.testset.split_hardcode.fix: "硬编码 turn_idx 阈值后改 split 大小要动代码 — 用 train/test split 配置让它能演化。"
check.testset.hash_branch.fix: "测试集 case ID 写死到 if 分支 = 用未来 eval 数据当前 case 特判，用户对这种作弊很较真。用通用判定逻辑。"
check.testset.case_list_hash.fix: "把具体 case 写死到列表 = 反喂池子嫌疑，用户对评测干净度很较真。用通用 fixture / 算法生成 case ID。"

# ===== 28 个 check trigger (v0.5.4) — audit log 分类标签 i18n =====

# chinese_plain (3 处)
check.chinese_plain.ratio.trigger: "自然语言中文占比 {ratio}% < {min}%"
check.chinese_plain.jargon.trigger: "术语 {term!r} 后无括号内中文解释"

# non_blocking (4 处)
check.non_blocking.python_block.trigger: "python 真阻塞接口: {call!r}"
check.non_blocking.sleep.trigger: "Bash sleep 命令: {cmd!r}"
check.non_blocking.wait.trigger: "Bash wait 命令阻塞"
check.non_blocking.long_task.trigger: "长任务不带 run_in_background: {cmd!r}"

# evidence (3 处)
check.evidence.commit.trigger: "git commit 前最近 session 内无测试通过证据"
check.evidence.completion.trigger: "声称 {word!r} 但 session 最近无测试通过证据"
check.evidence.weak_claim.trigger: "用『{word}』做硬声明且无测试证据"

# keep_pushing (2 处)
check.keep_pushing.stop_hint.trigger: "response 末尾含停顿语气 {word!r} — 明确表达暂停"
check.keep_pushing.default.trigger: "response 纯陈述完结，无推进信号 / 无询问决策 — 停下，没下一步计划"

# read_first (1 处)
check.read_first.trigger: "未 Read 就 {tool} {file_path}"

# bypass_karma (1 处)
check.bypass_karma.trigger: "绕开检测 — 手动写 karma 内部状态 ({target!r})"

# long_term (7 处)
check.long_term.long_id_branch.trigger: "长 ID 字面写在 if 分支（特例分支硬编码）"
check.long_term.blacklist_literal.trigger: "黑/白名单字面量列表（变量名匹配黑白名单语义）"
check.long_term.uppercase_const_list.trigger: "全大写常量 + 5+ 元素字符串列表（疑似硬编码黑/白名单）"
check.long_term.commit_hack.trigger: "git commit 标题行含 quick fix / hack / temp / 临时 字眼"
check.long_term.git_skip_verify.trigger: "git 危险动作跳过验证 flag"
check.long_term.todo_marker.trigger: "代码含 TODO/FIXME/HACK/临时 标记注释"
check.long_term.patch_intent.trigger: "代码含「打补丁 / 绕过 / 凑数 / workaround」意图注释"
check.long_term.response_patch_intent.trigger: "你的话术里含「我先打补丁 / 临时硬编码 / 短期方案」类短期意图 — 用户期望长期根因"
check.long_term.response_acknowledge_but_proceed.trigger: "你承认「不是长期方案」但仍宣告「先这样」继续短期路径 — 跟用户长期根因期望矛盾"

# testset (7 处)
check.testset.reverse_feed.trigger: "反喂测试集（写回 gold_cases / eval_cases）"
check.testset.detail_writeback.trigger: "把 detail.json (eval 结果) 写回训练数据"
check.testset.cross_split_copy.trigger: "Bash 跨 split 数据复制（eval / test → train）"
check.testset.detail_append.trigger: "append eval detail 结果到训练文件"
check.testset.split_hardcode.trigger: "数据 split 边界硬编码（turn_idx >= N）"
check.testset.hash_branch.trigger: "长 hash / UUID 字面在比较或 case_id 赋值里（测试集 case ID 写死）"
check.testset.case_list_hash.trigger: "测试集 / case 列表里写死长 hash 字面"

