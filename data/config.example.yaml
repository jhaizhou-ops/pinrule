# pinrule 配置文件 — 调阈值不用改代码
#
# 安装：pinrule init 会复制本文件到 ~/.pinrule/config.yaml
# 缺失字段用代码 DEFAULTS（见 pinrule/config.py:DEFAULTS）

# 桌面通知开关（macOS osascript / Linux notify-send / Windows msg）
# 设 false 完全关，或者环境变量 PINRULE_NO_NOTIFY=1 临时关
notify_enabled: true

# Agent 漂移按 turn 累积（不是人类时钟）— 用户去开会 30 分钟跟连续 30 个 turn
# Agent 状态完全不同，按人类时钟错维度。下面三个字段都是 turn 维度。

# ⚠️ 标记窗口 — 最近 N turn 内违反过的规则下次 user_prompt_submit 注入时标红
recent_violation_turns: 5

# 累积告警 — N turn 内同一规则违反 ≥ M 次 → 升级 🚨 严重通知
escalate_window_turns: 3
escalate_threshold: 3

# violations.jsonl 自动 rotation 配置
violations_max_lines: 5000          # 超过自动 rotate 为 .1
violations_keep_history: 3          # 保留 .1 .2 .3，最老删

# session-state json 清理周期（user_prompt_submit 每 turn 跑一次）
session_state_max_age_days: 30

# SessionState 保留最近 Bash 摘要条数
max_recent_bash: 15

# 中段规则重新注入累积 token 阈值 (v0.9.16+)
# 取消注释并填数字 → 强制覆盖按模型自适应阈值.
# 默认 (注释保留) → 按当前模型自适应 (Opus / Sonnet / Haiku 等阈值表).
# 例: 长 turn 严重 attention 漂移想更频繁注入 → reinject_every_n_tokens: 4000
# reinject_every_n_tokens: null
