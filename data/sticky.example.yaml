# karma v2 sticky 模板 — 用户最高优先级方向（6 条精选）
#
# 安装：复制本文件到 ~/.claude/karma/sticky.yaml
# 上限：10 条（超过 12 hook 拒绝加载）
#
# 字段:
#   id                  : kebab-case 短 slug
#   preference          : 多行允许，建议「方向 + 例外 + 决策提示」
#   violation_keywords  : 关键词列表（自然语言层扫描）
#   violation_checks    : 工程检测函数名列表（从 karma.checks 注册表）

- id: long-term-fundamental
  preference: |
    用最根本、最长期、最普适、最优雅的方案。
    不打补丁、不硬编码、不为追短期 KPI 牺牲长期质量。
    深挖到真根因再动手；遇到难题先想「最干净的解法是什么」而非「最快糊过去」。
  violation_keywords:
    - 先打个补丁
    - 快速绕过
    - 硬编码
    - 先这样
    - 临时方案
    - workaround
    - 先 hack
    - 暂时这样
    - 短期目标
  violation_checks:
    - long_term_fundamental

- id: non-blocking-parallel
  preference: |
    不阻塞前端 — 测试 / 子 Agent / 长任务跑步时，立刻并行推进其他能做的事。
    优先多 Agent 并发，不串行等。
    跑 background 任务后必须继续推进 — 起完任务就「等」也算阻塞。
  violation_keywords:
    - 等测试完
    - 等测试跑完
    - 等子 Agent
    - 等 X 完成后再 Y
    - 串行执行
    - 我先等
    - 等一下
    - 等会儿
    - 等结果出来
    - 我盯着
    - 我先看着
  violation_checks:
    - non_blocking_parallel

- id: chinese-plain-no-jargon
  preference: |
    用直白中文。不用英文技术术语（F1 / precision / supervisor / oracle 等）。
    用「综合得分 / 精度 / 召回率」等完整汉字。
    必须用英文专有名词时短解释一下。用类比解释复杂概念，不堆 jargon。
  violation_keywords: []  # 全靠工程检测，关键词版假阳性多
  violation_checks:
    - chinese_plain_no_jargon

- id: loud-failure-with-evidence
  preference: |
    失败要响亮，完成要有证据。不确定就明说，不要用「应该」「可能」掩盖。
    「完成」但 skip / mock / 假数据不算完成。
    每个「做完了」声明必须附证据（test pass / build OK / 数据 / 截图）。
  violation_keywords:
    - skip 了
    - 暂时假数据
    - 临时 mock
  violation_checks:
    - loud_failure_with_evidence

- id: no-testset-no-future-leakage
  preference: |
    不能用测试集 / 评测结果反喂训练数据 — 任何精度提升如果靠 eval 数据回流就是作弊。
    不能用未来数据喂当前模块 — turn N 的决策只能用 turn N-1 及之前的数据。
    改 prompt / 算法后必须重跑评测，不能用旧 cache 看效果。
  violation_keywords:
    - 反喂池子
    - LLM judge 写回
    - rerun 用最终池子
    - 取巧验证
  violation_checks:
    - no_testset_no_future_leakage

- id: read-before-write
  preference: |
    加代码前先读：上游调用、相关 exports、共享 utils、已有约定。
    「看起来不相关」是最危险的话 — 通常意味着没读够上下文。
    改任何模块前看清这个模块怎么被用、跟谁耦合、改了影响谁。
  violation_keywords:
    - 看起来不相关
    - 应该不影响其他
  violation_checks:
    - read_before_write
