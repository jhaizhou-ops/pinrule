# pinrule 信号：Agent response 末尾「推进信号」字眼（中文）
# 命中 → 豁免 keep_pushing 反思（Agent 已明确表达下一步计划）
#
# 中文 cartesian 结构 (主语 + 副词 + 动词):「我接下来 + 做 X」「立刻 + 开始 Y」
# templates 字段定义模板,用 {subject} {verb} 占位符 ×cartesian 展开成平面字眼。
# phrases 字段补充不需 cartesian 的整句平面字眼。
#
# 加新字眼:
#   - 新动词: 加到 verbs 列表 (自动跟所有 subjects cartesian)
#   - 新主语: 加到 subjects 列表
#   - 新整句: 加到 phrases (适合不规则短语)

templates:
  # 「我现在做 / 我立刻开始 / 我接下来去推」类
  - "{subject}\\s*{verb}"

subjects:
  - 我
  - 我现在
  - 我立刻
  - 我马上
  - 我立即
  - 我继续
  - 我先
  - 我来
  - 我接着
  - 我接下来
  - 我顺手
  - 我去
  - 我要去

verbs:
  - 做
  - 改
  - 加
  - 修
  - 跑
  - 去
  - 开始
  - 实施
  - 实现
  - 动手
  - 推
  - 搞
  - 写
  - 发
  - 提交
  - 测试
  - 验证
  - 跑测
  - 读
  - 看
  - 查
  - 测
  - 检查
  - 确认
  - 核对

phrases:
  # 不依赖主语的整句推进信号
  - 立刻做
  - 立刻开始
  - 立刻实施
  - 立刻推
  - 立刻继续
  - 立刻动手
  - 马上做
  - 马上开始
  - 马上实施
  - 马上推
  - 马上继续
  - 马上动手
  - 继续推进
  - 开始做
  - 直接做
  - 直接改
  - 直接开始
  - 直接实施
  - 直接推
  - 直接动手
  - 直接去做
  - 不停
  - 一并做
  - 一并改
  - 一并实施
  - 接下来去
  - 接下来做
  - 接下来改
  - 接下来加
  - 接下来修
  - 接下来跑
  - 接下来开始
  - 接下来实施
  - 接下来动手
  - 接下来推
