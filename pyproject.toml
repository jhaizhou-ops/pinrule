[project]
name = "karma"
version = "0.1.0"
description = "Sticky core directional preferences for Claude Code — keep Agent on track in long sessions"
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "jhz" }]
license = { text = "MIT" }
keywords = ["claude-code", "claude", "agent", "hook", "sticky", "preferences", "dogfooding"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: MacOS",
    "Operating System :: POSIX :: Linux",
    "Operating System :: Microsoft :: Windows",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Quality Assurance",
    "Topic :: Utilities",
]
dependencies = [
    "pyyaml>=6.0",
]

[project.urls]
Homepage = "https://github.com/jhaizhou-ops/karma"
Repository = "https://github.com/jhaizhou-ops/karma"
Issues = "https://github.com/jhaizhou-ops/karma/issues"
Changelog = "https://github.com/jhaizhou-ops/karma/blob/main/CHANGELOG.md"

[project.scripts]
karma = "karma.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.5",
    "vulture>=2.14",   # 死代码扫描 — 跑 `vulture karma/ --min-confidence 60`
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["karma"]
artifacts = ["data/*.yaml"]

[tool.hatch.build.targets.wheel.force-include]
"data/sticky.dev.example.yaml" = "data/sticky.dev.example.yaml"
"data/config.example.yaml" = "data/config.example.yaml"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"

[tool.ruff]
line-length = 100
target-version = "py311"
