    <rect class="background" height="100%" width="100%" x="0" y="0"/><defs><g id="g1"><text x="0" textLength="8" class="background"> </text></g><g id="g2"><text x="0" textLength="136" class="foreground">$ karma --version</text></g><g id="g3"><text x="0" textLength="104" class="foreground">karma v0.11.3</text></g><g id="g4"><text x="0" textLength="216" class="foreground">$ karma rule list | head -8</text></g><g id="g5"><text x="0" textLength="296" class="foreground">karma &#35268;&#21017; (10/10 &#36719;&#19978;&#38480;, 12 &#30828;&#19978;&#38480;):</text></g><g id="g6"><text x="0" textLength="208" class="foreground">1. [long-term-fundamental]</text></g><g id="g7"><text x="0" textLength="568" class="foreground">   &#29992;&#25143;&#30456;&#20449;&#20320;&#33021;&#28145;&#25366;&#26681;&#22240;&#12290;&#36935;&#21040;&#38590;&#39064;&#20182;&#24076;&#26395;&#20320;&#20808;&#20572;&#19979;&#24819;&#12300;&#26368;&#24178;&#20928;&#30340;&#35299;&#27861;&#26159;&#20160;&#20040;&#12301;</text></g><g id="g8"><text x="0" textLength="624" class="foreground">   &#32780;&#19981;&#26159;&#12300;&#26368;&#24555;&#31946;&#36807;&#21435;&#12301;&#12290;&#30701;&#26399;&#34917;&#19969; / &#30828;&#32534;&#30721; / &#36339;&#39564;&#35777; flag &#37117;&#26159;&#12300;&#20197;&#21518;&#20250;&#36824;&#30340;&#20538;&#12301;&#8212;</text></g><g id="g9"><text x="0" textLength="536" class="foreground">   &#20182;&#24895;&#24847;&#20026;&#38271;&#26399;&#36136;&#37327;&#31561;&#20320;&#22810;&#24819;&#20960;&#20998;&#38047;&#12290;&#22914;&#26524;&#26041;&#26696;&#20998;&#27495;&#22823;&#23601;&#25552;&#20986;&#26469;&#36319;&#20182;&#23545;&#40784;&#65292;</text></g><g id="g10"><text x="0" textLength="200" class="foreground">   &#19981;&#35201;&#33258;&#24049;&#25361;&#30701;&#26399;&#36335;&#20877;&#35828;&#12290;</text></g><g id="g11"><text x="0" textLength="648" class="foreground">   &#35302;&#21457;&#35789;: &#25105;&#20808;&#25171;&#20010;&#34917;&#19969;, &#20808;&#25171;&#20010;&#34917;&#19969;&#24212;&#20184;, &#25105;&#20808;&#30828;&#32534;&#30721;, &#20808;&#30828;&#32534;&#30721;&#19968;&#19979;, &#20808;&#24555;&#36895;&#32469;&#36807;, &#20808;</text></g><g id="g12"><text x="0" textLength="432" class="foreground">&#29992;&#20020;&#26102;&#26041;&#26696;, &#20808;&#29992; workaround, &#20808;&#36825;&#26679;, &#26242;&#26102;&#36825;&#26679;, &#20808; hack</text></g><g id="g13"><text x="0" textLength="576" class="foreground">$ echo '{...sleep 30 violation...}' | python karma/hooks/pre_tool_use.py</text></g><g id="g14"><text x="0" textLength="584" class="foreground">&#128721; karma: non-blocking-parallel (tool=Bash) &#8212; Bash sleep &#21629;&#20196;: 'sleep 30'</text></g><g id="g15"><text x="0" textLength="640" class="foreground">{"hookSpecificOutput": {"hookEventName": "PreToolUse", "permissionDecision": "de</text></g><g id="g16"><text x="0" textLength="640" class="foreground">ny", "permissionDecisionReason": "karma &#25318;&#25130;&#65306;&#36829;&#21453; 'non-blocking-parallel'&#12290;\n&#26816;</text></g><g id="g17"><text x="0" textLength="640" class="foreground">&#27979;&#21040;&#65306;Bash sleep &#21629;&#20196;: 'sleep 30'\n&#26041;&#21521;&#65306;sleep / wait / &#31561;&#38271;&#20219;&#21153;&#36305;&#23436;&#26399;&#38388;&#65292;&#29992;&#25143;&#31561;</text></g><g id="g18"><text x="0" textLength="648" class="foreground">&#20320;&#30340;&#36755;&#20986;&#12290;&#30447;&#30528;&#36827;&#24230;&#26465;&#19981;&#26159;&#21327;&#20316; &#8212; &#26159;&#12300;&#21345;&#20102;&#12301;&#12290;\n&#36215;&#23436; background &#20219;&#21153;&#31435;&#21051;&#25512;&#36827;&#19979;&#19968;&#20214;&#33021;</text></g><g id="g19"><text x="0" textLength="648" class="foreground">&#20570;&#30340;&#65288;&#35835;&#30456;&#20851;&#25991;&#20214; / &#36215;&#21478;&#19968;&#20010;&#23376; Agent /\n&#35774;&#35745;&#19979;&#19968;&#27493;&#65289;&#8212; &#20219;&#21153;&#23436;&#25104;&#20320;&#20250;&#34987;&#36890;&#30693;&#21040;&#12290