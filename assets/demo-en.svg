<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" id="terminal" baseProfile="full" viewBox="0 0 640 410" width="640" version="1.1">
    <defs>
        <termtosvg:template_settings xmlns:termtosvg="https://github.com/nbedos/termtosvg">
            <termtosvg:screen_geometry columns="80" rows="24"/>
            <termtosvg:animation type="css"/>
        </termtosvg:template_settings>
        <style type="text/css" id="generated-style"><![CDATA[#screen {
                font-family: 'DejaVu Sans Mono', monospace;
                font-style: normal;
                font-size: 14px;
            }

        text {
            dominant-baseline: text-before-edge;
            white-space: pre;
        }
    
            :root {
                --animation-duration: 42508ms;
            }

            @keyframes roll {
                0.000%{transform:translateY(0px)}
7.173%{transform:translateY(-442px)}
12.104%{transform:translateY(-884px)}
16.846%{transform:translateY(-1326px)}
23.955%{transform:translateY(-1768px)}
28.877%{transform:translateY(-2210px)}
33.620%{transform:translateY(-2652px)}
40.722%{transform:translateY(-3094px)}
45.467%{transform:translateY(-3536px)}
54.877%{transform:translateY(-3978px)}
61.967%{transform:translateY(-4420px)}
66.715%{transform:translateY(-4862px)}
76.124%{transform:translateY(-5304px)}
83.220%{transform:translateY(-5746px)}
87.995%{transform:translateY(-6188px)}
92.886%{transform:translateY(-6630px)}
97.648%{transform:translateY(-7072px)}
100.000%{transform:translateY(-7072px)}
            }

            #screen_view {
                animation-duration: 42508ms;
                animation-iteration-count:infinite;
                animation-name:roll;
                animation-timing-function: steps(1,end);
                animation-fill-mode: forwards;
            }
        ]]></style>
        <style type="text/css" id="user-style">
            /* The colors defined below are the default 16 colors used for rendering text of the terminal. Adjust
               them as needed.
               PowerShell colors based on https://en.wikipedia.org/wiki/ANSI_escape_code#Colors */
            .foreground {fill: #cccccc;}
            .background {fill: #0c0c0c;}
            .color0 {fill: #0c0c0c;}
            .color1 {fill: #c50f1f;}
            .color2 {fill: #13a10e;}
            .color3 {fill: #c19c00;}
            .color4 {fill: #0037da;}
            .color5 {fill: #881798;}
            .color6 {fill: #3a96dd;}
            .color7 {fill: #cccccc;}
            .color8 {fill: #767676;}
            .color9 {fill: #e74856;}
            .color10 {fill: #16c60c;}
            .color11 {fill: #f9f1a5;}
            .color12 {fill: #3b78ff;}
            .color13 {fill: #b4009e;}
            .color14 {fill: #61d6d6;}
            .color15 {fill: #f2f2f2;}
        </style>
    </defs>
    <svg id="screen" width="640" height="408" viewBox="0 0 640 408" preserveAspectRatio="xMidYMin slice">
    <rect class="background" height="100%" width="100%" x="0" y="0"/><defs><g id="g1"><text x="0" textLength="592" class="foreground">&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;</text></g><g id="g2"><text x="0" textLength="392" class="foreground">  Scene 1/5 &#8212; Inject rules at every prompt header</text></g><g id="g3"><text x="0" textLength="360" class="foreground">  (UserPromptSubmit hook &#8594; ~490 token anchor)</text></g><g id="g4"><text x="0" textLength="8" class="background"> </text></g><g id="g5"><text x="0" textLength="376" class="foreground">$ echo {prompt} | pinrule_user_prompt_submit.py</text></g><g id="g6"><text x="0" textLength="328" class="foreground">  Scene 2/5 &#8212; Real-time block of sleep 30</text></g><g id="g7"><text x="0" textLength="344" class="foreground">  (PreToolUse hook &#8594; non-blocking-parallel)</text></g><g id="g8"><text x="0" textLength="496" class="foreground">$ echo {tool=Bash, command=sleep 30} | pinrule_pre_tool_use.py</text></g><g id="g9"><text x="0" textLength="208" class="foreground">  permissionDecision: deny</text></g><g id="g10"><text x="0" textLength="448" class="foreground">  pinrule blocked: violation of 'non-blocking-parallel'.</text></g><g id="g11"><text x="0" textLength="336" class="foreground">  Detected: Bash sleep command: 'sleep 30'</text></g><g id="g12"><text x="0" textLength="640" class="foreground">  Direction: During sleep / wait / long-task execution, the user is waiting for </text></g><g id="g13"><text x="0" textLength="32" class="foreground">your</text></g><g id="g14"><text x="0" textLength="568" class="foreground">  output. Staring at a progress bar isn't collaboration &#8212; it's "stuck."</text></g><g id="g15"><text x="0" textLength="640" class="foreground">  Suggestion: sleep periods make the user wait; experience is 'stuck.' Switch to</text></g><g id="g16"><text x="0" textLength="640" class="foreground"> run_in_background=True kicking off the task, then immediately push the next doa</text></g><g id="g17"><text x="0" textLength="640" class="foreground">ble thing (read related files / spawn another sub-agent / design next step) &#8212; ta</text></g><g id="g18"><text x="0" textLength="632" class="foreground">sk completion will notify you. For wait-on-condition, use Monitor + until loop.</text></g><g id="g19"><text x="0" textLength="440" class="foreground">  Scene 3/5 &#8212; Catch short-term intent in Agent response</text></g><g id="g20"><text x="0" textLength="384" class="foreground">  (Stop hook &#8594; long-term v0.11.0 response-level)</text></g><g id="g21"><text x="0" textLength="472" class="foreground">$ # Agent said: "Let me just hardcode this case to ship it"</text></g><g id="g22"><text x="0" textLength="400" class="foreground">$ pinrule_stop.py reads transcript, scans response</text></g><g id="g23"><text x="0" textLength="472" class="foreground">  Scene 4/5 &#8212; Nudge Agent to keep pushing after silent stop</text></g><g id="g24"><text x="0" textLength="288" class="foreground">  (Stop hook &#8594; keep-pushing-no-stop)</text></g><g id="g25"><text x="0" textLength="512" class="foreground">$ # Agent said: "Task complete."  (pure statement, no next step)</text></g><g id="g26"><text x="0" textLength="504" class="foreground">  Scene 5/5 &#8212; Mid-conversation full reinject at decay threshold</text></g><g id="g27"><text x="0" textLength="488" class="foreground">  (PostToolUse hook &#8594; byte_seq hits Opus 60K &#8594; full baseline)</text></g><g id="g28"><text x="0" textLength="512" class="foreground">$ # session state: tool_byte_seq=62000 (past Opus 60K threshold)</text></g><g id="g29"><text x="0" textLength="360" class="foreground">$ echo {tool=Read} | pinrule_post_tool_use.py</text></g><g id="g30"><text x="0" textLength="400" class="foreground">[pinrule &#8212; Your long-term agreement with the user]</text></g><g id="g31"><text x="0" textLength="640" class="foreground">You're collaborating with a real human user who listed several long-term priorit</text></g><g id="g32"><text x="0" textLength="32" class="foreground">ies.</text></g><g id="g33"><text x="0" textLength="640" class="foreground">This isn't rules and isn't a judgment &#8212; these are the collaborative agreements t</text></g><g id="g34"><text x="0" textLength="216" class="foreground">hey hope to build with you.</text></g><g id="g35"><text x="0" textLength="640" class="foreground">1. [long-term-fundamental] The user trusts you to dig into root causes. When fac</text></g><g id="g36"><text x="0" textLength="136" class="foreground">ing hard problems</text></g><g id="g37"><text x="0" textLength="536" class="foreground">   they want you to pause and think "what's the cleanest solution?"</text></g><g id="g38"><text x="0" textLength="336" class="foreground">   rather than "what's the fastest patc...</text></g><g id="g39"><text x="0" textLength="368" class="foreground">  That's pinrule &#8212; pure engineering, zero LLM.</text></g><g id="g40"><text x="0" textLength="264" class="foreground">  github.com/jhaizhou-ops/pinrule</text></g></defs><g id="screen_view"><g><use xlink:href="#g1" y="17"/><use xlink:href="#g2" y="34"/><use xlink:href="#g3" y="51"/><use xlink:href="#g1" y="68"/><rect x="0" y="85" width="8" height="17" class="foreground"/><use xlink:href="#g4" y="85"/></g><g><use xlink:href="#g1" y="459"/><use xlink:href="#g2" y="476"/><use xlink:href="#g3" y="493"/><use xlink:href="#g1" y="510"/><use xlink:href="#g5" y="527"/><rect x="0" y="544" width="8" height="17" class="foreground"/><use xlink:href="#g4" y="544"/></g><g><use xlink:href="#g1" y="901"/><use xlink:href="#g2" y="918"/><use xlink:href="#g3" y="935"/><use xlink:href="#g1" y="952"/><use xlink:href="#g5" y="969"/><rect x="0" y="1003" width="8" height="17" class="foreground"/><use xlink:href="#g4" y="1003"/></g><g><use xlink:href="#g1" y="1343"/><use xlink:href="#g2" y="1360"/><use xlink:href="#g3" y="1377"/><use xlink:href="#g1" y="1394"/><use xlink:href="#g5" y="1411"/><use xlink:href="#g1" y="1462"/><use xlink:href="#g6" y="1479"/><use xlink:href="#g7" y="1496"/><use xlink:href="#g1" y="1513"/><rect x="0" y="1530" width="8" height="17" class="foreground"/><use xlink:href="#g4" y="1530"/></g><g><use xlink:href="#g1" y="1785"/><use xlink:href="#g2" y="1802"/><use xlink:href="#g3" y="1819"/><use xlink:href="#g1" y="1836"/><use xlink:href="#g5" y="1853"/><use xlink:href="#g1" y="1904"/><use xlink:href="#g6" y="1921"/><use xlink:href="#g7" y="1938"/><use xlink:href="#g1" y="1955"/><use xlink:href="#g8" y="1972"/><rect x="0" y="1989" width="8" height="17" class="foreground"/><use xlink:href="#g4" y="1989"/></g><g><use xlink:href="#g1" y="2210"/><use xlink:href="#g2" y="2227"/><use xlink:href="#g3" y="2244"/><use xlink:href="#g1" y="2261"/><use xlink:href="#g5" y="2278"/><use xlink:href="#g1" y="2329"/><use xlink:href="#g6" y="2346"/><use xlink:href="#g7" y="2363"/><use xlink:href="#g1" y="2380"/><use xlink:href="#g8" y="2397"/><use xlink:href="#g9" y="2414"/><use xlink:href="#g10" y="2448"/><use xlink:href="#g11" y="2465"/><use xlink:href="#g12" y="2482"/><use xlink:href="#g13" y="2499"/><use xlink:href="#g14" y="2516"/><use xlink:href="#g15" y="2533"/><use xlink:href="#g16" y="2550"/><use xlink:href="#g17" y="2567"/><use xlink:href="#g18" y="2584"/><rect x="0" y="2601" width="8" height="17" class="foreground"/><use xlink:href="#g4" y="2601"/></g><g><use xlink:href="#g1" y="2686"/><use xlink:href="#g6" y="2703"/><use xlink:href="#g7" y="2720"/><use xlink:href="#g1" y="2737"/><use xlink:href="