    <rect class="background" height="100%" width="100%" x="0" y="0"/><defs><g id="g1"><text x="0" textLength="8" class="background"> </text></g><g id="g2"><text x="0" textLength="592" class="foreground">&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;</text></g><g id="g3"><text x="0" textLength="296" class="foreground">  &#22330;&#26223; 1/5 &#8212; &#27599;&#26465; prompt &#22836;&#37096;&#27880;&#20837;&#35268;&#21017;</text></g><g id="g4"><text x="0" textLength="400" class="foreground">  (UserPromptSubmit hook &#8594; ~490 token &#31934;&#31616; anchor)</text></g><g id="g5"><text x="0" textLength="376" class="foreground">$ echo {prompt} | pinrule_user_prompt_submit.py</text></g><g id="g6"><text x="0" textLength="240" class="foreground">  &#22330;&#26223; 2/5 &#8212; sleep 30 &#23454;&#26102;&#25318;&#25130;</text></g><g id="g7"><text x="0" textLength="344" class="foreground">  (PreToolUse hook &#8594; non-blocking-parallel)</text></g><g id="g8"><text x="0" textLength="496" class="foreground">$ echo {tool=Bash, command=sleep 30} | pinrule_pre_tool_use.py</text></g><g id="g9"><text x="0" textLength="216" class="foreground">  permissionDecision: allow</text></g><g id="g10"><text x="0" textLength="16" class="foreground">  </text></g><g id="g11"><text x="0" textLength="280" class="foreground">  &#22330;&#26223; 3/5 &#8212; Agent &#22238;&#24212;&#30701;&#26399;&#35805;&#26415;&#25318;&#25130;</text></g><g id="g12"><text x="0" textLength="384" class="foreground">  (Stop hook &#8594; long-term v0.11.0 response-level)</text></g><g id="g13"><text x="0" textLength="352" class="foreground">$ # Agent &#35828;: "&#25105;&#20808;&#30828;&#32534;&#30721;&#36825;&#20010; case &#35753; CI &#36807;"</text></g><g id="g14"><text x="0" textLength="400" class="foreground">$ pinrule_stop.py reads transcript, scans response</text></g><g id="g15"><text x="0" textLength="296" class="foreground">  &#22330;&#26223; 4/5 &#8212; Agent &#38745;&#40664;&#20572;&#27490;&#26102;&#25512;&#21160;&#32487;&#32493;</text></g><g id="g16"><text x="0" textLength="288" class="foreground">  (Stop hook &#8594; keep-pushing-no-stop)</text></g><g id="g17"><text x="0" textLength="400" class="foreground">$ # Agent &#35828;: "&#20219;&#21153;&#24050;&#32463;&#23436;&#25104;&#20102;&#12290;"  (&#32431;&#38472;&#36848;&#26080;&#19979;&#19968;&#27493;)</text></g><g id="g18"><text x="0" textLength="416" class="foreground">  &#22330;&#26223; 5/5 &#8212; &#38271; context &#32047;&#31215;&#21040;&#25296;&#28857;&#20013;&#27573;&#34917;&#19968;&#27425;&#23436;&#25972;&#35268;&#21017;</text></g><g id="g19"><text x="0" textLength="456" class="foreground">  (PostToolUse hook &#8594; byte_seq &#36798; Opus 60K &#33258;&#21160; reinject)</text></g><g id="g20"><text x="0" textLength="504" class="foreground">$ # session state: tool_byte_seq=62000 (&#24050;&#36807; Opus 60K &#34928;&#20943;&#25296;&#28857;)</text></g><g id="g21"><text x="0" textLength="360" class="foreground">$ echo {tool=Read} | pinrule_post_tool_use.py</text></g><g id="g22"><text x="0" textLength="264" class="foreground">  &#36825;&#23601;&#26159; pinrule &#8212; &#32431;&#24037;&#31243;, &#38646; LLM</text></g><g id="g23"><text x="0" textLength="264" class="foreground">  github.com/jhaizhou-ops/pinrule</text></g></defs><g id="screen_view"><g><rect x="0" y="0" width="8" height="17" class="foreground"/><use xlink:href="#g1" y="0"/></g><g><use xlink:href="#g2" y="459"/><use xlink:href="#g3" y="476"/><use xlink:href="#g4" y="493"/><use xlink:href="#g2" y="510"/>