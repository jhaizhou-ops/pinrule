<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" id="terminal" baseProfile="full" viewBox="0 0 640 410" width="640" version="1.1">
    <defs>
        <termtosvg:template_settings xmlns:termtosvg="https://github.com/nbedos/termtosvg">
            <termtosvg:screen_geometry columns="80" rows="24"/>
            <termtosvg:animation type="css"/>
        </termtosvg:template_settings>
        <style type="text/css" id="generated-style"><![CDATA[#screen {
                font-family: 'DejaVu Sans Mono', monospace;
                font-style: normal;
                font-size: 14px;
            }

        text {
            dominant-baseline: text-before-edge;
            white-space: pre;
        }
    
            :root {
                --animation-duration: 1102ms;
            }

            @keyframes roll {
                0.000%{transform:translateY(0px)}
0.544%{transform:translateY(-442px)}
1.089%{transform:translateY(-884px)}
1.633%{transform:translateY(-1326px)}
2.178%{transform:translateY(-1768px)}
2.722%{transform:translateY(-2210px)}
3.267%{transform:translateY(-2652px)}
3.721%{transform:translateY(-3094px)}
4.265%{transform:translateY(-3536px)}
4.809%{transform:translateY(-3978px)}
5.354%{transform:translateY(-4420px)}
5.898%{transform:translateY(-4862px)}
6.534%{transform:translateY(-5304px)}
7.078%{transform:translateY(-5746px)}
7.623%{transform:translateY(-6188px)}
8.167%{transform:translateY(-6630px)}
8.711%{transform:translateY(-7072px)}
9.256%{transform:translateY(-7514px)}
100.000%{transform:translateY(-7514px)}
            }

            #screen_view {
                animation-duration: 1102ms;
                animation-iteration-count:infinite;
                animation-name:roll;
                animation-timing-function: steps(1,end);
                animation-fill-mode: forwards;
            }
        ]]></style>
        <style type="text/css" id="user-style">
            /* The colors defined below are the default 16 colors used for rendering text of the terminal. Adjust
               them as needed.
