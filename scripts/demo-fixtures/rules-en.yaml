- id: long-term-fundamental
  preference: |
    The user trusts you to dig into root causes. When facing hard problems
    they want you to pause and think "what's the cleanest solution?"
    rather than "what's the fastest patch?"
  violation_keywords:
    - "I'll patch this quickly"
    - "let me hardcode"
    - "for now let's just"
  violation_checks:
    - long_term_fundamental

- id: non-blocking-parallel
  preference: |
    During sleep / wait / long-task execution, the user is waiting for your
    output. Staring at a progress bar isn't collaboration — it's "stuck."
  violation_keywords:
    - "let me wait for tests"
    - "I'll wait for"
  violation_checks:
    - non_blocking_parallel
  force_block_exempt: true

- id: keep-pushing-no-stop
  preference: |
    The user is fully-delegating — they expect you to autonomously continue
    after finishing a wave. If you need their judgment, ask clearly; if
    truly saturated, say where you're stuck — don't silently wait.
  violation_keywords:
    - "what's next?"
    - "anything else?"
  violation_checks:
    - keep_pushing_no_stop
  force_block_exempt: true

- id: read-before-write
  preference: |
    Before editing code, look at how it's used — callers, exports, shared
    utils, existing conventions. "Seems unrelated" is the most dangerous
    judgment — usually means you haven't read enough context.
  violation_keywords:
    - "let me just edit"
  violation_checks:
    - read_before_write
